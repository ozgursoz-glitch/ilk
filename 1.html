<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG G-code Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #252525;
            --bg-tertiary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-blue: #00d4ff;
            --accent-yellow: #ffff00;
            --accent-orange: #ff9900;
            --accent-red: #ff4444;
            --accent-purple: #b388ff;
            --border-color: #404040;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: calc(100vh - 40px);
        }

        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        button {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        button:hover {
            background: #3d3d3d;
            border-color: #555;
        }

        button.active {
            background: #3d5c3d;
            border-color: #4caf50;
        }

        .btn-update { background: #2d5a2d; }
        .btn-update:hover { background: #3d6a3d; }

        .btn-save { background: #2d4a5a; }
        .btn-save:hover { background: #3d5a6a; }

        .btn-svg { background: #5a2d4a; }
        .btn-svg:hover { background: #6a3d5a; }

        .btn-coord.active { background: #2d5a5a; }
        .btn-line-track.active { background: #5a5a2d; }
        .btn-ruler.active { background: #5a2d5a; }

        .tool-panel {
            background: var(--bg-tertiary);
            padding: 10px;
            border-radius: 4px;
        }

        .tool-label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .tool-input-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .tool-input {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 13px;
        }

        .quick-buttons {
            display: flex;
            gap: 4px;
        }

        .btn-q {
            padding: 6px 10px;
            min-width: 36px;
            font-size: 12px;
        }

        #gcodeArea {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            resize: none;
        }

        .main {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #viewer {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #mainSvg {
            display: block;
        }

        .coord-tooltip {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: var(--accent-blue);
            padding: 6px 10px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            pointer-events: none;
        }

        .axis-marker {
            fill: var(--text-secondary);
            font-size: 14px;
        }

        .indicator-label {
            fill: var(--accent-yellow);
            font-family: 'Consolas', monospace;
            font-size: 12px;
        }

        .status-bar {
            height: 40px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
        }

        .status-section {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .status-item {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .status-label {
            color: var(--text-secondary);
        }

        .status-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .status-file {
            font-weight: 600;
            color: var(--accent-blue);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="toolbar">
            <input type="file" id="fileInput" style="display:none">
            <button onclick="triggerFileLoad()">Dosya Aç</button>
            <button class="btn-update" onclick="render()">Güncelle</button>
            <button class="btn-save" onclick="saveGCode()">G-Code</button>
            <button class="btn-svg" onclick="saveSVG()">SVG</button>
            <button onclick="autoFit()">Sığdır</button>
            <button id="toggleCoordBtn" class="btn-coord active" onclick="toggleCoordinateTracking()">XYZ On</button>
            <button id="toggleLineTrackBtn" class="btn-line-track active" onclick="toggleLineTracking()">Çizgi On</button>
            <button id="toggleRulerBtn" class="btn-ruler active" onclick="toggleRulerTool()">Cetvel On</button>
        </div>

        <div class="tool-panel">
            <label class="tool-label">Bıçak Çapı (Genişlik)</label>
            <div class="tool-input-row">
                <input type="number" id="toolDiameter" class="tool-input" value="6" min="0.001" max="100" step="any" oninput="updateToolWidth()">
                <div class="quick-buttons">
                    <button class="btn-q" onclick="setToolDiameter(3)">3</button>
                    <button class="btn-q" onclick="setToolDiameter(4)">4</button>
                    <button class="btn-q" onclick="setToolDiameter(6)">6</button>
                    <button class="btn-q" onclick="setToolDiameter(8)">8</button>
                    <button class="btn-q" onclick="setToolDiameter(10)">10</button>
                    <button class="btn-q" onclick="setToolDiameter(12)">12</button>
                </div>
            </div>
        </div>
        
        <textarea id="gcodeArea" placeholder="G-Code kodlarını buraya yapıştırın..."></textarea>
    </div>

    <div class="main">
        <div id="viewer">
            <div id="coordTooltip" class="coord-tooltip">X: 0.00 | Y: 0.00</div>
            
            <svg id="mainSvg" width="100%" height="100%">
                <g id="viewport">
                    <defs>
                        <pattern id="gridPattern" width="100" height="100" patternUnits="userSpaceOnUse">
                            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#252525" stroke-width="1.5"/>
                        </pattern>
                    </defs>
                    
                    <g id="layerBackground">
                        <rect x="0" y="0" width="4200" height="2100" fill="#050505" />
                        <rect x="0" y="0" width="4200" height="2100" fill="url(#gridPattern)" />
                        <rect x="0" y="0" width="4200" height="2100" fill="none" stroke="#444" stroke-width="4" />
                    </g>

                    <g id="rulerLayer"></g>
                    
                    <text x="2100" y="2250" class="axis-marker" text-anchor="middle">X-AXIS (MAX 4200)</text>
                    <text x="-150" y="1050" class="axis-marker" text-anchor="middle" transform="rotate(-90, -150, 1050)">Y-AXIS (MAX 2100)</text>

                    <g id="drawLayer" transform="scale(1, -1) translate(0, -2100)">
                        <line x1="0" y1="2087" x2="4200" y2="2087" stroke="#ff3333" stroke-width="3" stroke-dasharray="10,5" />
                        <path id="pathTravel" d="" stroke="#444444" fill="none" stroke-dasharray="8,4" />
                        <path id="pathCut" d="" stroke="#00d4ff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                        <g id="layerDrill"></g>
                    </g>

                    <g id="lineIndicatorLayer" style="display: none; pointer-events: none;" transform="scale(1, -1) translate(0, -2100)">
                        <line id="indicatorX" x1="0" y1="0" x2="0" y2="2100" stroke="#ffff00" stroke-width="2" stroke-dasharray="6,4" opacity="0.8" />
                        <line id="indicatorY" x1="0" y1="0" x2="4200" y2="0" stroke="#ffff00" stroke-width="2" stroke-dasharray="6,4" opacity="0.8" />
                        <circle id="indicatorCenter" cx="0" cy="0" r="6" fill="#ffff00" stroke="#000" stroke-width="1.5" />
                    </g>

                    <text id="indicatorText" x="0" y="0" class="indicator-label" style="display: none;">X:0.0 Y:0.0</text>

                    <!-- Cetvel (normal koordinatlarda, drawLayer DIŞINDA) -->
                    <g id="rulerToolLayer" style="display: block;">
                        <!-- Çizgi -->
                        <line id="rulerLine" x1="200" y1="200" x2="800" y2="800" stroke="#b388ff" stroke-width="2" stroke-dasharray="6,4" />
                        
                        <!-- Mesafe yazısı -->
                        <text id="rulerText" x="500" y="490" fill="#b388ff" font-family="monospace" font-size="14px" font-weight="bold" text-anchor="middle">0.0 mm</text>
                        
                        <!-- BAŞ noktası (A) - yarı şeffaf, ortasında + -->
                        <g id="handleAGroup" cursor="move">
                            <rect id="handleA" x="190" y="190" width="20" height="20" fill="#ff4444" stroke="#fff" stroke-width="1.5" rx="3" opacity="0.6" />
                            <line x1="195" y1="200" x2="205" y2="200" stroke="#fff" stroke-width="1.5" pointer-events="none" />
                            <line x1="200" y1="195" x2="200" y2="205" stroke="#fff" stroke-width="1.5" pointer-events="none" />
                        </g>
                        
                        <!-- SON noktası (B) - yarı şeffaf, ortasında + -->
                        <g id="handleBGroup" cursor="move">
                            <rect id="handleB" x="790" y="790" width="20" height="20" fill="#44aaff" stroke="#fff" stroke-width="1.5" rx="3" opacity="0.6" />
                            <line x1="795" y1="800" x2="805" y2="800" stroke="#fff" stroke-width="1.5" pointer-events="none" />
                            <line x1="800" y1="795" x2="800" y2="805" stroke="#fff" stroke-width="1.5" pointer-events="none" />
                        </g>
                    </g>

                </g>
            </svg>
        </div>
    </div>
</div>

<div class="status-bar">
    <div class="status-section">
        <div class="status-file" id="val-filename">output.nc</div>
        <div class="status-item"><span class="status-label">Satır / Nokta:</span><span class="status-value" id="val-pts">0</span></div>
        <div class="status-item"><span class="status-label">Giriş / Delik Sayısı:</span><span class="status-value" id="val-drillcnt" style="color: #ff9900;">0</span></div>
        <div class="status-item" id="focused-line-section" style="display: none;">
            <span class="status-label" style="color: #ffff00;">Hedef Satır:</span>
            <span class="status-value" id="val-focused-line" style="color: #ffff00;">0</span>
        </div>
    </div>
    
    <div class="status-section">
        <div class="status-item"><span class="status-label">Tezgah X Max:</span><span class="status-value" id="val-w">0.0</span></div>
        <div class="status-item"><span class="status-label">Tezgah Y Max:</span><span class="status-value" id="val-h">0.0</span></div>
        <div class="status-item"><span class="status-label">Derinlik (Z Min):</span><span class="status-value" id="val-zmin">0.0</span></div>
        <div class="status-item">
            <span class="status-label">Safe Z:</span>
            <span class="status-value" id="val-safe-z" style="color: #888;">0.0 mm</span>
        </div>
        <div class="status-item">
            <span class="status-label">İşlem Derinliği:</span>
            <span class="status-value" id="val-process-depth" style="color: #ff9900;">0.0 mm</span>
        </div>
        <div class="status-item"><span class="status-label">BBox:</span><span class="status-value" id="val-bbox" style="color: #ccc;">X: 0 / 0 | Y: 0 / 0</span></div>
    </div>
</div>

    <script>
        // ==================== utils.js ====================
        const Utils = {
            parseFloat: function(val, def) {
                if (val === undefined || val === null || val === '') return def;
                const v = parseFloat(val);
                return isNaN(v) ? def : v;
            },
            
            clamp: function(val, min, max) {
                return Math.max(min, Math.min(max, val));
            },
            
            formatNum: function(num, decimals) {
                if (decimals === undefined) decimals = 2;
                return num.toFixed(decimals);
            }
        };

        // ==================== gcodeParser.js ====================
        const GCodeParser = {
            lines: [],
            points: [],
            travels: [],
            cuts: [],
            drills: [],
            bbox: { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity, minZ: 0, maxZ: 0 },
            safeZ: 5,
            processDepth: 0,
            drillCount: 0,
            
            parse: function(gcode) {
                this.lines = gcode.split('\n');
                this.points = [];
                this.travels = [];
                this.cuts = [];
                this.drills = [];
                this.bbox = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity, minZ: 0, maxZ: 0 };
                this.drillCount = 0;
                
                let x = 0, y = 0, z = 0;
                let isRapid = false;
                let startPoint = null;
                
                for (let i = 0; i < this.lines.length; i++) {
                    let line = this.lines[i].trim();
                    if (!line || line.startsWith('(') || line.startsWith(';')) continue;
                    
                    line = line.split(/[;(]/)[0].trim();
                    if (!line) continue;
                    
                    const parts = line.split(/\s+/);
                    let cmd = '';
                    let newX = x, newY = y, newZ = z;
                    let hasMove = false;
                    
                    for (const part of parts) {
                        const upper = part.toUpperCase();
                        if (upper.startsWith('G')) {
                            cmd = upper;
                        } else if (upper.startsWith('X')) {
                            newX = Utils.parseFloat(upper.substring(1), x);
                            hasMove = true;
                        } else if (upper.startsWith('Y')) {
                            newY = Utils.parseFloat(upper.substring(1), y);
                            hasMove = true;
                        } else if (upper.startsWith('Z')) {
                            newZ = Utils.parseFloat(upper.substring(1), z);
                            hasMove = true;
                        }
                    }
                    
                    if (cmd === 'G0' || cmd === 'G00') {
                        isRapid = true;
                    } else if (cmd === 'G1' || cmd === 'G01') {
                        isRapid = false;
                    }
                    
                    if (hasMove) {
                        if (startPoint === null) {
                            startPoint = { x, y, z };
                        }
                        
                        if (isRapid && (x !== newX || y !== newY)) {
                            this.travels.push({ x1: x, y1: y, x2: newX, y2: newY });
                        } else if (!isRapid && (x !== newX || y !== newY)) {
                            this.cuts.push({ x1: x, y1: y, x2: newX, y2: newY, z: newZ });
                            if (newZ < this.bbox.minZ) this.bbox.minZ = newZ;
                            if (newZ > this.bbox.maxZ) this.bbox.maxZ = newZ;
                            if (newZ < 0 && Math.abs(newZ) > Math.abs(this.processDepth)) {
                                this.processDepth = newZ;
                            }
                        }
                        
                        if (cmd === 'G81' || cmd === 'G83' || line.toUpperCase().includes('G81') || line.toUpperCase().includes('G83')) {
                            this.drills.push({ x: newX, y: newY, z: newZ });
                            this.drillCount++;
                        }
                        
                        x = newX;
                        y = newY;
                        z = newZ;
                        
                        this.updateBBox(x, y);
                    }
                }
                
                if (this.bbox.minX === Infinity) {
                    this.bbox = { minX: 0, maxX: 0, minY: 0, maxY: 0, minZ: 0, maxZ: 0 };
                }
                
                return {
                    travels: this.travels,
                    cuts: this.cuts,
                    drills: this.drills,
                    bbox: this.bbox,
                    safeZ: this.safeZ,
                    processDepth: this.processDepth,
                    drillCount: this.drillCount,
                    lineCount: this.lines.length
                };
            },
            
            updateBBox: function(x, y) {
                if (x < this.bbox.minX) this.bbox.minX = x;
                if (x > this.bbox.maxX) this.bbox.maxX = x;
                if (y < this.bbox.minY) this.bbox.minY = y;
                if (y > this.bbox.maxY) this.bbox.maxY = y;
            },
            
            getFocusedLine: function(lineNum) {
                if (lineNum < 0 || lineNum >= this.lines.length) return null;
                const line = this.lines[lineNum];
                const parts = line.split(/\s+/);
                let x = 0, y = 0;
                for (const part of parts) {
                    const upper = part.toUpperCase();
                    if (upper.startsWith('X')) x = Utils.parseFloat(upper.substring(1), 0);
                    if (upper.startsWith('Y')) y = Utils.parseFloat(upper.substring(1), 0);
                }
                return { x, y, lineNum };
            }
        };

        // ==================== ruler.js ====================
        const RulerTool = {
            enabled: true,
            startX: 200,
            startY: 200,
            endX: 800,
            endY: 800,
            dragging: null,
            
            init: function() {
                const handleA = document.getElementById('handleAGroup');
                const handleB = document.getElementById('handleBGroup');
                const rulerLayer = document.getElementById('rulerToolLayer');
                
                if (handleA) {
                    handleA.addEventListener('mousedown', (e) => this.startDrag(e, 'A'));
                    handleA.addEventListener('touchstart', (e) => this.startDrag(e, 'A'), { passive: false });
                }
                if (handleB) {
                    handleB.addEventListener('mousedown', (e) => this.startDrag(e, 'B'));
                    handleB.addEventListener('touchstart', (e) => this.startDrag(e, 'B'), { passive: false });
                }
                
                document.addEventListener('mousemove', (e) => this.drag(e));
                document.addEventListener('touchmove', (e) => this.drag(e), { passive: false });
                document.addEventListener('mouseup', () => this.endDrag());
                document.addEventListener('touchend', () => this.endDrag());
                
                this.updateDisplay();
            },
            
            startDrag: function(e, handle) {
                e.preventDefault();
                this.dragging = handle;
            },
            
            drag: function(e) {
                if (!this.dragging) return;
                e.preventDefault();
                
                const svg = document.getElementById('mainSvg');
                const rect = svg.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const x = clientX - rect.left;
                const y = clientY - rect.top;
                
                if (this.dragging === 'A') {
                    this.startX = x;
                    this.startY = y;
                } else {
                    this.endX = x;
                    this.endY = y;
                }
                
                this.updateDisplay();
            },
            
            endDrag: function() {
                this.dragging = null;
            },
            
            updateDisplay: function() {
                const rulerLine = document.getElementById('rulerLine');
                const rulerText = document.getElementById('rulerText');
                const handleA = document.getElementById('handleA');
                const handleB = document.getElementById('handleB');
                
                if (!rulerLine || !rulerText || !handleA || !handleB) return;
                
                const dx = this.endX - this.startX;
                const dy = this.endY - this.startY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                rulerLine.setAttribute('x1', this.startX);
                rulerLine.setAttribute('y1', this.startY);
                rulerLine.setAttribute('x2', this.endX);
                rulerLine.setAttribute('y2', this.endY);
                
                const midX = (this.startX + this.endX) / 2;
                const midY = (this.startY + this.endY) / 2;
                rulerText.setAttribute('x', midX);
                rulerText.setAttribute('y', midY - 10);
                rulerText.textContent = distance.toFixed(1) + ' mm';
                
                handleA.setAttribute('x', this.startX - 10);
                handleA.setAttribute('y', this.startY - 10);
                handleB.setAttribute('x', this.endX - 10);
                handleB.setAttribute('y', this.endY - 10);
            },
            
            toggle: function() {
                this.enabled = !this.enabled;
                const layer = document.getElementById('rulerToolLayer');
                const btn = document.getElementById('toggleRulerBtn');
                if (layer) layer.style.display = this.enabled ? 'block' : 'none';
                if (btn) btn.classList.toggle('active', this.enabled);
                return this.enabled;
            }
        };

        // ==================== viewer.js ====================
        const Viewer = {
            toolWidth: 6,
            currentFile: 'output.nc',
            focusedLineIndex: -1,
            showCoordinates: true,
            showLineTrack: true,
            
            init: function() {
                this.updatePaths();
            },
            
            render: function(data) {
                if (!data) return;
                
                const pathTravel = document.getElementById('pathTravel');
                const pathCut = document.getElementById('pathCut');
                const layerDrill = document.getElementById('layerDrill');
                
                if (pathTravel) {
                    let d = '';
                    data.travels.forEach(t => {
                        d += `M ${t.x1} ${t.y1} L ${t.x2} ${t.y2} `;
                    });
                    pathTravel.setAttribute('d', d || 'M 0 0');
                }
                
                if (pathCut) {
                    let d = '';
                    data.cuts.forEach(c => {
                        d += `M ${c.x1} ${c.y1} L ${c.x2} ${c.y2} `;
                    });
                    pathCut.setAttribute('d', d || 'M 0 0');
                    pathCut.setAttribute('stroke-width', this.toolWidth);
                }
                
                if (layerDrill) {
                    layerDrill.innerHTML = '';
                    data.drills.forEach(d => {
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('cx', d.x);
                        circle.setAttribute('cy', d.y);
                        circle.setAttribute('r', this.toolWidth / 2);
                        circle.setAttribute('fill', '#ff9900');
                        circle.setAttribute('opacity', '0.7');
                        layerDrill.appendChild(circle);
                    });
                }
                
                this.updateStatus(data);
            },
            
            updateStatus: function(data) {
                document.getElementById('val-filename').textContent = this.currentFile;
                document.getElementById('val-pts').textContent = data.lineCount;
                document.getElementById('val-drillcnt').textContent = data.drillCount;
                document.getElementById('val-w').textContent = Utils.formatNum(data.bbox.maxX);
                document.getElementById('val-h').textContent = Utils.formatNum(data.bbox.maxY);
                document.getElementById('val-zmin').textContent = Utils.formatNum(data.bbox.minZ);
                document.getElementById('val-safe-z').textContent = Utils.formatNum(data.safeZ) + ' mm';
                document.getElementById('val-process-depth').textContent = Utils.formatNum(data.processDepth) + ' mm';
                document.getElementById('val-bbox').textContent = 
                    `X: ${Utils.formatNum(data.bbox.minX)} / ${Utils.formatNum(data.bbox.maxX)} | Y: ${Utils.formatNum(data.bbox.minY)} / ${Utils.formatNum(data.bbox.maxY)}`;
                
                const focusedSection = document.getElementById('focused-line-section');
                if (this.focusedLineIndex >= 0) {
                    document.getElementById('val-focused-line').textContent = this.focusedLineIndex + 1;
                    if (focusedSection) focusedSection.style.display = 'flex';
                } else if (focusedSection) {
                    focusedSection.style.display = 'none';
                }
            },
            
            autoFit: function() {
                // Basit implementasyon - gerçekte viewBox ayarlaması yapılır
                console.log('Auto-fit triggered');
            },
            
            setToolWidth: function(width) {
                this.toolWidth = width;
                document.getElementById('toolDiameter').value = width;
                this.render(GCodeParser.parse(document.getElementById('gcodeArea').value));
            },
            
            toggleCoordinateTracking: function() {
                this.showCoordinates = !this.showCoordinates;
                const tooltip = document.getElementById('coordTooltip');
                const btn = document.getElementById('toggleCoordBtn');
                if (tooltip) tooltip.style.display = this.showCoordinates ? 'block' : 'none';
                if (btn) btn.classList.toggle('active', this.showCoordinates);
                return this.showCoordinates;
            },
            
            toggleLineTracking: function() {
                this.showLineTrack = !this.showLineTrack;
                const indicatorLayer = document.getElementById('lineIndicatorLayer');
                const indicatorText = document.getElementById('indicatorText');
                const btn = document.getElementById('toggleLineTrackBtn');
                const display = this.showLineTrack ? 'block' : 'none';
                if (indicatorLayer) indicatorLayer.style.display = display;
                if (indicatorText) indicatorText.style.display = display;
                if (btn) btn.classList.toggle('active', this.showLineTrack);
                return this.showLineTrack;
            },
            
            setFocusedLine: function(lineIndex) {
                this.focusedLineIndex = lineIndex;
                const data = GCodeParser.parse(document.getElementById('gcodeArea').value);
                this.render(data);
            }
        };

        // ==================== events.js ====================
        const Events = {
            init: function() {
                const fileInput = document.getElementById('fileInput');
                const gcodeArea = document.getElementById('gcodeArea');
                
                if (fileInput) {
                    fileInput.addEventListener('change', (e) => this.handleFileSelect(e));
                }
                
                if (gcodeArea) {
                    gcodeArea.addEventListener('input', () => this.renderCurrent());
                }
                
                const mainSvg = document.getElementById('mainSvg');
                if (mainSvg) {
                    mainSvg.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                }
            },
            
            handleFileSelect: function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                Viewer.currentFile = file.name;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    document.getElementById('gcodeArea').value = evt.target.result;
                    this.renderCurrent();
                };
                reader.readAsText(file);
            },
            
            renderCurrent: function() {
                const gcode = document.getElementById('gcodeArea').value;
                const data = GCodeParser.parse(gcode);
                Viewer.render(data);
            },
            
            handleMouseMove: function(e) {
                if (!Viewer.showCoordinates) return;
                
                const svg = document.getElementById('mainSvg');
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = rect.height - (e.clientY - rect.top);
                
                const tooltip = document.getElementById('coordTooltip');
                if (tooltip) {
                    tooltip.textContent = `X: ${x.toFixed(2)} | Y: ${y.toFixed(2)}`;
                }
            }
        };

        // ==================== main.js ====================
        document.addEventListener('DOMContentLoaded', function() {
            RulerTool.init();
            Viewer.init();
            Events.init();
            
            window.triggerFileLoad = function() {
                document.getElementById('fileInput').click();
            };
            
            window.render = function() {
                Events.renderCurrent();
            };
            
            window.saveGCode = function() {
                const gcode = document.getElementById('gcodeArea').value;
                const blob = new Blob([gcode], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = Viewer.currentFile;
                a.click();
                URL.revokeObjectURL(url);
            };
            
            window.saveSVG = function() {
                const svg = document.getElementById('mainSvg');
                const serializer = new XMLSerializer();
                const svgStr = serializer.serializeToString(svg);
                const blob = new Blob([svgStr], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'output.svg';
                a.click();
                URL.revokeObjectURL(url);
            };
            
            window.autoFit = function() {
                Viewer.autoFit();
            };
            
            window.toggleCoordinateTracking = function() {
                Viewer.toggleCoordinateTracking();
            };
            
            window.toggleLineTracking = function() {
                Viewer.toggleLineTracking();
            };
            
            window.toggleRulerTool = function() {
                RulerTool.toggle();
            };
            
            window.updateToolWidth = function() {
                const val = parseFloat(document.getElementById('toolDiameter').value);
                if (val && val > 0) {
                    Viewer.toolWidth = val;
                    Events.renderCurrent();
                }
            };
            
            window.setToolDiameter = function(d) {
                document.getElementById('toolDiameter').value = d;
                Viewer.toolWidth = d;
                Events.renderCurrent();
            };
            
            // Varsayılan örnek G-code
            const defaultGCode = `G21
G90
G0 X0 Y0
G1 X100 Y0 F500
G1 X100 Y100
G1 X0 Y100
G1 X0 Y0
G0 X200 Y200
G1 X300 Y200
G1 X300 Y300
G1 X200 Y300
G1 X200 Y200`;
            
            document.getElementById('gcodeArea').value = defaultGCode;
            Events.renderCurrent();
        });
    </script>
</body>
</html>
